<!DOCTYPE html>
<html>

<head>
<title>Google clone</title>

<style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
   }

  header{
     display:flex;
     justify-content:space-between;
     align-items:center;
     padding:20px 40px;
   }

  .leftnav , .rightnav{
      display:flex;
      gap:25px;
   }

   header a{
      text-decoration:none;
      color:black;
      font-size:18px;
   }

   main{
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-top:70px;
   }

   .logo{
      width:500px;
      height:auto;
      margin-bottom:45px;
   }

   .search-box{
      width:650px;
     
   }

   .search-box input{
       width:100%;
       height:55px;
       border: 1px solid rgba(223,225,229);
       border-radius:24px;
       padding: 0px 20px;
       font-size:24px;
       outline:none;
       box-shadow:0px 1px 6px rgba(32,33,36,0.20);
   }

   .search-box input:hover, .search-box input:focus{
      box-shadow:0 1px 6px 
      rgba(32,33,36,28);
   }

   
</style>

</head>

<body>
 <header>
    <div class="leftnav">
       <a href="" >About</a>
       <a href="" >Store</a>
    </div>
    <div class="rightnav">
       <a href="" >Gmail</a>
       <a href="" >Images</a>
       <a href="" >Search Bar</a>
    </div>
 </header>
 <main>
   <img class="logo" src="googleImg.jpg"/>
 <div class="search-box">
  <input type="text" placeholder="Search">
 </div>
</main>

</body>
</html>
